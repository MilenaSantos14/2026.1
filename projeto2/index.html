<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    
    <h4>DADOS PESSOAIS</h4>

    <label>Nome:</label>
    <input type="text" id="iptNomeID" name="Nome"><br>
    <label>Data de Nascimento:</label>
    <input type="date" id="iptDataID" name="Data"><br>
    <label>Cor favorita:</label>
    <input type="color" id="iptcolorID" name="color"><br>
    <label>Endereço:</label>
    <input type="text" id="iptEndereçoID" name="Endereço"><br>
    <label>Cidade:</label>
    <input type="text" id="iptCidadeID" name="Cidade"><br>
    <label>CEP:</label>
    <input type="text" id="iptCepID" name="CEP"><br>
    <label>Estado:</label>
    <select name="Estado"> 
        <option value="Ce">Ceará</option>
        <option value="SP">São Paulo</option>
        <option value="RN" selected>Rio Grande do Norte</option>
        <option value="RJ">Rio de Janeiro</option>
        <option value="PA">Pará</option>
    </select>

    <h4> DADOS PROFISSIONAIS </h4>

    <p>Natureza do cargo </p>
    <input type="radio" name="cargo">Gerencia
    <input type="radio" name="cargo">Financeiro
    <input type="radio" name="cargo">Recepçao
    <input type="radio" name="cargo">Administrativo
    <input type="radio" name="cargo">Juridico

    <h4>ÁREA DE INTERESSE</h4>
    <input type="checkbox"> Computação
    <input type="checkbox"> Quimica
    <input type="checkbox"> Meio ambiente
    <input type="checkbox"> Matematica
    <input type="checkbox"> Engenharia

    



        

    


</html>
